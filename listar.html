<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parecer - Educação Infantil (BNCC)</title>
  <link rel="stylesheet" href="../assets/css/styleList.css" />
</head>

<body>
  <header class="header">
    <div class="header-left">
      <img src="../assets/img/logo.png" alt="Logo" class="header-img">
    </div>

    <div class="header-title"> 
      <h1>Listagem de Alunos</h1>
    </div>

    <div class="header-right">
      <button class="btn-voltar" id="btn-voltar">Voltar</button>
    </div>
  </header>

  <main class="main">
    <div class="table-container">
      <table class="table">
        <thead>
          <tr>
            <th>Nome</th>
            <th>Turma</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tabelaAlunos">
          <!-- Os dados dos alunos serão inseridos aqui dinamicamente -->
        </tbody>
      </table>
    </div>
  </main>
  
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="../assets/script/scriptList.js"></script>
</body>
</html>
